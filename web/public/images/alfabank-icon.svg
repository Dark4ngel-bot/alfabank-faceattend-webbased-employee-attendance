<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Stripe pattern for the icon background -->
    <pattern id="blueStripesIcon" width="6" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="6" y2="2" stroke="#123c8c" stroke-width="1.5" />
    </pattern>
  </defs>

  <!-- Left Icon Container (Square with horizontal stripes) -->
  <rect x="5" y="5" width="90" height="90" rx="10" fill="#ffffff" stroke="#ffffff" stroke-width="2" />
  <rect x="5" y="5" width="90" height="90" rx="10" fill="url(#blueStripesIcon)" />

  <!-- Stylized Triangle A Logo Inside Icon Container -->
  <!-- Outer Triangle Container background (white highlight behind red symbol) -->
  <polygon points="50,14 14,58 35,58" fill="#ffffff" />
  <polygon points="50,14 86,58 65,58" fill="#ffffff" />
  
  <!-- The Red 'A' Triangles -->
  <!-- Left diagonal red leg -->
  <polygon points="50,16 18,56 34,56 50,32" fill="#e11d48" />
  <polygon points="50,32 34,56 50,56" fill="#ffffff" />
  <!-- Right diagonal red leg -->
  <polygon points="50,16 82,56 66,56 50,32" fill="#e11d48" />
  <polygon points="50,32 66,56 50,56" fill="#ffffff" />
  <!-- Inner small red support -->
  <polygon points="50,42 40,56 60,56" fill="#e11d48" />
</svg>
