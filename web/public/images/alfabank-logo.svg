<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 220" width="100%" height="100%">
  <defs>
    <!-- Stripe pattern for the icon background -->
    <pattern id="blueStripes" width="6" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="2" x2="6" y2="2" stroke="#123c8c" stroke-width="1.5" />
    </pattern>
    <!-- Font style styling -->
    <style>
      .logo-title {
        font-family: 'Arial Black', 'Impact', sans-serif;
        font-weight: 900;
        fill: #ffffff;
      }
      .logo-subtitle {
        font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        font-weight: bold;
        letter-spacing: 0.25em;
        fill: #ffffff;
      }
      .slogan-text {
        font-family: 'Arial', sans-serif;
        font-weight: 900;
        font-style: italic;
      }
    </style>
  </defs>

  <!-- Blue Outer Banner Box -->
  <rect x="10" y="10" width="480" height="110" rx="10" fill="#123c8c" stroke="#3b82f6" stroke-width="4" />
  <!-- Inner thin outline for double border effect -->
  <rect x="14" y="14" width="472" height="102" rx="7" fill="none" stroke="#ffffff" stroke-width="1.5" />

  <!-- Left Icon Container (Square with horizontal stripes) -->
  <rect x="25" y="25" width="80" height="80" rx="4" fill="#ffffff" stroke="#ffffff" stroke-width="2" />
  <rect x="25" y="25" width="80" height="80" rx="4" fill="url(#blueStripes)" />

  <!-- Stylized Triangle A Logo Inside Icon Container -->
  <!-- Outer Triangle Container background (white highlight behind red symbol) -->
  <polygon points="65,33 33,72 52,72" fill="#ffffff" />
  <polygon points="65,33 97,72 78,72" fill="#ffffff" />
  
  <!-- The Red 'A' Triangles -->
  <!-- Left diagonal red leg -->
  <polygon points="65,35 37,70 51,70 65,49" fill="#e11d48" />
  <polygon points="65,49 51,70 65,70" fill="#ffffff" />
  <!-- Right diagonal red leg -->
  <polygon points="65,35 93,70 79,70 65,49" fill="#e11d48" />
  <polygon points="65,49 79,70 65,70" fill="#ffffff" />
  <!-- Inner small red support -->
  <polygon points="65,58 56,70 74,70" fill="#e11d48" />

  <!-- Text inside blue box -->
  <text x="125" y="48" font-size="13" class="logo-subtitle">LEMBAGA PENDIDIKAN</text>
  
  <!-- ALFABANK Bold Font with white filled & custom clean stripes style -->
  <text x="122" y="98" font-size="52" class="logo-title" letter-spacing="0.02em">ALFABANK</text>

  <!-- Slogan Section Below the Banner -->
  <g transform="translate(10, 130)">
    <!-- Kursus (Italic, dark grey) -->
    <text x="15" y="55" font-size="34" class="slogan-text" fill="#1f2937">Kursus</text>
    
    <!-- Singkat (Italic, red) -->
    <text x="135" y="55" font-size="34" class="slogan-text" fill="#e11d48">Singkat</text>

    <!-- Kerja (Italic, black text inside yellow skewed block) -->
    <g transform="translate(265, 18)">
      <polygon points="5,-3 105,-3 90,43 -10,43" fill="#ffcc00" stroke="#1f2937" stroke-width="2" />
      <text x="12" y="30" font-size="31" class="slogan-text" fill="#000000">Kerja</text>
    </g>

    <!-- diDapat (Italic, white text inside black skewed block with orange border) -->
    <g transform="translate(360, 18)">
      <polygon points="5,-3 140,-3 125,43 -10,43" fill="#1f2937" stroke="#ea580c" stroke-width="2" />
      <text x="10" y="30" font-size="31" class="slogan-text" fill="#ffffff">diDapat</text>
    </g>
  </g>
</svg>
